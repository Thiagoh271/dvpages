<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DvPages — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #22222e;
    --border2: #2e2e3e;
    --accent: #e94560;
    --accent-glow: rgba(233, 69, 96, 0.18);
    --accent-dim: rgba(233, 69, 96, 0.08);
    --text: #e0e0e8;
    --muted: #52526a;
    --success: #4ade80;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(233,69,96,0.06) 0%, transparent 70%);
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 36px 36px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-size: 30px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .logo span { color: var(--accent); }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border2), transparent);
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-autofill: none;
  }

  input[type="email"]:focus,
  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  input::placeholder { color: #35354a; }

  .error-msg {
    background: rgba(233, 69, 96, 0.08);
    border: 1px solid rgba(233, 69, 96, 0.2);
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 12px;
    color: #ff6b85;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .error-msg::before {
    content: "✕";
    font-size: 10px;
    font-weight: 700;
    opacity: 0.7;
  }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 700;
    padding: 11px;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    letter-spacing: 0.02em;
  }

  .submit-btn:hover {
    background: #d13350;
    box-shadow: 0 4px 20px rgba(233,69,96,0.35);
  }

  .submit-btn:active { transform: scale(0.985); }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #2a2a3a;
    margin-top: 24px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="logo">Dv<span>Pages</span></div>
    <div class="tagline">Editor visual de páginas HTML</div>
  </div>

  <div class="divider"></div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login" autocomplete="on">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <button class="submit-btn" type="submit">Entrar</button>
  </form>

  <div class="footer-note">Acesso restrito — apenas usuários cadastrados</div>
</div>

</body>
</html>
